services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: system-e2e-mysql-password
      MYSQL_DATABASE: docpilot
      TZ: Asia/Shanghai
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --innodb-ft-min-token-size=1
    tmpfs:
      - /var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -psystem-e2e-mysql-password"]
      interval: 3s
      timeout: 3s
      retries: 50

  redis:
    image: redis:7.4-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 30

  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    command: server /data
    environment:
      MINIO_ROOT_USER: system-e2e-minio
      MINIO_ROOT_PASSWORD: system-e2e-minio-password
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 3s
      timeout: 3s
      retries: 50

  agent-postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: docpilot_agent
      POSTGRES_USER: docpilot_agent
      POSTGRES_PASSWORD: system-e2e-agent-password
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docpilot_agent -d docpilot_agent"]
      interval: 3s
      timeout: 3s
      retries: 40

  agentops-postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: agentops
      POSTGRES_USER: agentops
      POSTGRES_PASSWORD: system-e2e-agentops-password
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentops -d agentops"]
      interval: 3s
      timeout: 3s
      retries: 40

  agentops-redis:
    image: redis:7.4-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 30

  server:
    build: ./server
    environment:
      SPRING_PROFILES_ACTIVE: demo
      DB_URL: jdbc:mysql://mysql:3306/docpilot?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      DB_USERNAME: root
      DB_PASSWORD: system-e2e-mysql-password
      REDIS_HOST: redis
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: system-e2e-minio
      MINIO_SECRET_KEY: system-e2e-minio-password
      JWT_SECRET: system-e2e-jwt-secret-with-more-than-thirty-two-bytes
      QUEUE_MODE: local
      AI_MODE: local
      EMBEDDING_MODE: local
      VECTOR_STORE_ENABLED: "false"
      OCR_ENABLED: "false"
      AGENT_ENABLED: "true"
      AGENT_BASE_URL: http://agent-service:8090
      AGENT_INTERNAL_KEY: system-e2e-docpilot-internal-key
      AGENT_INTERNAL_IDENTITY_SECRET: system-e2e-docpilot-identity-secret
      AGENT_INTERNAL_IDENTITY_REQUIRED: "true"
      AGENT_SERVICE_KEY: system-e2e-docpilot-service-key
      AGENT_APPROVAL_SECRET: system-e2e-approval-secret-distinct-from-other-keys
      AGENT_FALLBACK_TO_RAG: "false"
      TZ: Asia/Shanghai
    depends_on:
      mysql: {condition: service_healthy}
      redis: {condition: service_healthy}
      minio: {condition: service_healthy}
      agent-service: {condition: service_healthy}
    ports:
      - "127.0.0.1:${DOCPILOT_E2E_PORT:-28081}:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 50

  agent-service:
    build: ./agent-service
    environment:
      APP_ENV: development
      AGENT_SERVICE_KEY: system-e2e-docpilot-service-key
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      OLLAMA_MODEL: qwen3.5:2b
      DOCPILOT_BASE_URL: http://server:8080
      DOCPILOT_INTERNAL_KEY: system-e2e-docpilot-internal-key
      DOCPILOT_IDENTITY_TOKEN_SECRET: system-e2e-docpilot-identity-secret
      CHECKPOINT_BACKEND: postgres
      CHECKPOINT_DSN: postgresql://docpilot_agent:system-e2e-agent-password@agent-postgres:5432/docpilot_agent?sslmode=disable
      AGENTOPS_ENABLED: "true"
      AGENTOPS_BASE_URL: http://agentops-api:8100
      AGENTOPS_API_KEY: system-e2e-platform-key-with-sufficient-entropy
      AGENTOPS_IDENTITY_TOKEN_SECRET: system-e2e-identity-secret-with-sufficient-entropy
      AGENTOPS_IDENTITY_SUBJECT: docpilot-agent
      AGENTOPS_IDENTITY_TENANT: default
      AGENTOPS_IDENTITY_ROLE: OPERATOR
      AGENTOPS_IDENTITY_ISSUER: docpilot-agent
      AGENTOPS_IDENTITY_AUDIENCE: agentops-hub
      AGENTOPS_IDENTITY_KEY_ID: v1
      AGENTOPS_GOVERNANCE_ENABLED: "false"
      TRACE_CAPTURE_CONTENT: "false"
      TZ: Asia/Shanghai
    depends_on:
      agent-postgres: {condition: service_healthy}
      agentops-api: {condition: service_healthy}
    ports:
      - "127.0.0.1:${DOCPILOT_AGENT_E2E_PORT:-28090}:8090"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8090/health/ready')"]
      interval: 5s
      timeout: 3s
      retries: 50

  agentops-api:
    build:
      context: ${AGENTOPS_CONTEXT:-../agentops}
      target: runtime
    environment: &agentops-env
      APP_ENV: production
      PLATFORM_API_KEY: system-e2e-platform-key-with-sufficient-entropy
      AUTH_MODE: hmac
      IDENTITY_TOKEN_SECRET: system-e2e-identity-secret-with-sufficient-entropy
      IDENTITY_TOKEN_ISSUER: docpilot-agent
      IDENTITY_TOKEN_AUDIENCE: agentops-hub
      IDENTITY_TOKEN_KEY_ID: v1
      DATABASE_URL: postgresql+psycopg://agentops:system-e2e-agentops-password@agentops-postgres:5432/agentops
      CELERY_BROKER_URL: redis://agentops-redis:6379/0
      CELERY_RESULT_BACKEND: redis://agentops-redis:6379/1
      TOOL_COORDINATION_REDIS_URL: redis://agentops-redis:6379/2
      TOOL_ALLOW_PRIVATE_HOSTS: "false"
      EVALUATION_ALLOWED_HOSTS: agent-service
      DOCPILOT_AGENT_SERVICE_KEY: system-e2e-docpilot-service-key
      EVALOPS_ENABLED: "true"
      EVALOPS_CHECKPOINT_BACKEND: postgres
      EVALOPS_CHECKPOINT_DSN: postgresql://agentops:system-e2e-agentops-password@agentops-postgres:5432/agentops?sslmode=disable
      EVALOPS_APPROVAL_SECRET: system-e2e-evalops-approval-secret-distinct
      EVALUATION_JUDGE_ENABLED: "false"
      EVALUATION_CASE_CONCURRENCY: "2"
      TRACE_CAPTURE_CONTENT: "false"
    depends_on:
      agentops-postgres: {condition: service_healthy}
      agentops-redis: {condition: service_healthy}
    ports:
      - "127.0.0.1:${AGENTOPS_E2E_PORT:-28100}:8100"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8100/health/ready')"]
      interval: 5s
      timeout: 3s
      retries: 50

  agentops-worker:
    build:
      context: ${AGENTOPS_CONTEXT:-../agentops}
      target: runtime
    command: ["celery", "-A", "app.tasks:celery_app", "worker", "--loglevel=WARNING", "--concurrency=1"]
    environment: *agentops-env
    depends_on:
      agentops-api: {condition: service_healthy}
