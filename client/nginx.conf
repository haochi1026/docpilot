server{listen 80;server_name _;root /usr/share/nginx/html;index index.html;client_max_body_size 110m;location /{try_files $uri $uri/ /index.html;}location /api/{proxy_pass http://server:8080;proxy_set_header Host $host;proxy_buffering off;proxy_read_timeout 130s;}location /actuator/{proxy_pass http://server:8080;}}
