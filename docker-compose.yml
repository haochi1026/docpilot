services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: docpilot
      TZ: Asia/Shanghai
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --innodb-ft-min-token-size=1
    volumes:
      - docpilot_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD"]
      interval: 5s
      timeout: 3s
      retries: 30
  redis:
    image: redis:7.2-alpine
    command: redis-server --appendonly yes
    volumes:
      - docpilot_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    volumes:
      - docpilot_minio:/data
    ports:
      - "127.0.0.1:19001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 30
  vector-postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: docpilot_vector
      POSTGRES_USER: docpilot_vector
      POSTGRES_PASSWORD: ${VECTOR_DB_PASSWORD:-docpilot-vector-local-password}
    volumes:
      - docpilot_vector_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docpilot_vector -d docpilot_vector"]
      interval: 5s
      timeout: 3s
      retries: 30
  server:
    build: ./server
    environment:
      APP_ENV: ${APP_ENV:-development}
      DB_URL: jdbc:mysql://mysql:3306/docpilot?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      REDIS_HOST: redis
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      JWT_SECRET: ${JWT_SECRET:-docpilot-local-demo-secret-change-before-production}
      QUEUE_MODE: ${QUEUE_MODE:-local}
      AI_MODE: ${AI_MODE:-local}
      AI_BASE_URL: ${AI_BASE_URL:-http://host.docker.internal:11434/v1}
      AI_API_KEY: ${AI_API_KEY:-ollama}
      AI_MODEL: ${AI_MODEL:-qwen3.5:2b}
      AI_CONNECT_TIMEOUT_MS: ${AI_CONNECT_TIMEOUT_MS:-2000}
      AI_READ_TIMEOUT_MS: ${AI_READ_TIMEOUT_MS:-180000}
      EMBEDDING_MODE: ${EMBEDDING_MODE:-local}
      EMBEDDING_BASE_URL: ${EMBEDDING_BASE_URL:-http://host.docker.internal:11434/v1}
      EMBEDDING_API_KEY: ${EMBEDDING_API_KEY:-ollama}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-qwen3-embedding:0.6b}
      EMBEDDING_DIMENSION: ${EMBEDDING_DIMENSION:-1024}
      EMBEDDING_CONNECT_TIMEOUT_MS: ${EMBEDDING_CONNECT_TIMEOUT_MS:-2000}
      EMBEDDING_READ_TIMEOUT_MS: ${EMBEDDING_READ_TIMEOUT_MS:-60000}
      VECTOR_STORE_ENABLED: "true"
      VECTOR_DB_URL: jdbc:postgresql://vector-postgres:5432/docpilot_vector
      VECTOR_DB_USERNAME: docpilot_vector
      VECTOR_DB_PASSWORD: ${VECTOR_DB_PASSWORD:-docpilot-vector-local-password}
      VECTOR_CANDIDATE_LIMIT: ${VECTOR_CANDIDATE_LIMIT:-80}
      RETRIEVAL_MIN_SCORE: ${RETRIEVAL_MIN_SCORE:-0.20}
      RETRIEVAL_MIN_LEXICAL_SCORE: ${RETRIEVAL_MIN_LEXICAL_SCORE:-0.05}
      RETRIEVAL_MIN_VECTOR_SCORE: ${RETRIEVAL_MIN_VECTOR_SCORE:-0.45}
      RETRIEVAL_LEXICAL_WEIGHT: ${RETRIEVAL_LEXICAL_WEIGHT:-0.35}
      RETRIEVAL_VECTOR_WEIGHT: ${RETRIEVAL_VECTOR_WEIGHT:-0.65}
      LEXICAL_CANDIDATE_LIMIT: ${LEXICAL_CANDIDATE_LIMIT:-160}
      RETRIEVAL_STRATEGY: ${RETRIEVAL_STRATEGY:-HYBRID_RERANK}
      RERANK_CANDIDATE_LIMIT: ${RERANK_CANDIDATE_LIMIT:-24}
      RERANK_WEIGHT: ${RERANK_WEIGHT:-0.25}
      CHUNK_MAX_TOKENS: ${CHUNK_MAX_TOKENS:-480}
      CHUNK_OVERLAP_TOKENS: ${CHUNK_OVERLAP_TOKENS:-60}
      OCR_ENABLED: ${OCR_ENABLED:-true}
      OCR_LANGUAGE: ${OCR_LANGUAGE:-chi_sim+eng}
      OCR_MIN_PAGE_TEXT_CHARS: ${OCR_MIN_PAGE_TEXT_CHARS:-20}
      OCR_MAX_PAGES: ${OCR_MAX_PAGES:-100}
      OCR_TIMEOUT_SECONDS: ${OCR_TIMEOUT_SECONDS:-60}
      OCR_MIN_CONFIDENCE: ${OCR_MIN_CONFIDENCE:-45}
      DOCUMENT_REVISION_RETENTION_COUNT: ${DOCUMENT_REVISION_RETENTION_COUNT:-3}
      INFERENCE_LEASE_SECONDS: ${INFERENCE_LEASE_SECONDS:-240}
      INFERENCE_LOCAL_FALLBACK: ${INFERENCE_LOCAL_FALLBACK:-true}
      TZ: Asia/Shanghai
      CORS_ORIGINS: http://localhost:15174,http://127.0.0.1:15174
    depends_on:
      mysql: { condition: service_healthy }
      redis: { condition: service_healthy }
      minio: { condition: service_healthy }
      vector-postgres: { condition: service_healthy }
    ports:
      - "127.0.0.1:18081:8080"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 30
  client:
    build: ./client
    depends_on:
      server: { condition: service_healthy }
    ports:
      - "127.0.0.1:15174:80"

volumes:
  docpilot_mysql:
  docpilot_redis:
  docpilot_minio:
  docpilot_vector_postgres:
